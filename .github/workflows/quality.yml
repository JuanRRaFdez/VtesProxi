name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'pyproject.toml', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: |
          set -euo pipefail
          make lint

      - name: Typecheck
        run: |
          set -euo pipefail
          make typecheck

  runtime:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Django check
        run: |
          set -euo pipefail
          make check

      - name: Test
        run: |
          set -euo pipefail
          make test

      - name: Emit quality evidence payload
        if: ${{ success() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          GENERATED_AT_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          python - <<'PY'
          import json
          import os

          payload = {
              "run_url": os.environ["RUN_URL"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "workflow_name": os.environ["GITHUB_WORKFLOW"],
              "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "commit_sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "generated_at_utc": os.environ["GENERATED_AT_UTC"],
              "jobs": {
                  "static": {
                      "name": "static",
                      "conclusion": "success",
                  },
                  "runtime": {
                      "name": "runtime",
                      "conclusion": "success",
                  },
              },
          }

          with open("quality-evidence.json", "w", encoding="utf-8") as evidence_file:
              json.dump(payload, evidence_file, indent=2)

          required_keys = [
              "run_url",
              "run_id",
              "run_attempt",
              "workflow_name",
              "commit_sha",
              "ref",
              "generated_at_utc",
              "jobs",
          ]
          missing = [key for key in required_keys if not payload.get(key)]
          if missing:
              raise SystemExit(f"Missing required evidence keys: {missing}")
          PY

      - name: Upload quality evidence artifact
        if: ${{ success() && hashFiles('quality-evidence.json') != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: quality-evidence.json

      - name: Append quality evidence summary
        if: ${{ success() && hashFiles('quality-evidence.json') != '' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          python - <<'PY'
          import json

          with open("quality-evidence.json", "r", encoding="utf-8") as evidence_file:
              payload = json.load(evidence_file)

          summary_line = (
              "| quality-gate | "
              f"[{payload['run_id']}]({payload['run_url']}) | "
              f"{payload['commit_sha']} | "
              f"static={payload['jobs']['static']['conclusion']} / "
              f"runtime={payload['jobs']['runtime']['conclusion']} |"
          )

          with open("summary-row.md", "w", encoding="utf-8") as summary_file:
              summary_file.write("### CI evidence\n")
              summary_file.write("| Workflow | Run | Commit | Jobs |\n")
              summary_file.write("| --- | --- | --- | --- |\n")
              summary_file.write(summary_line + "\n")
          PY
          cat summary-row.md >> "$GITHUB_STEP_SUMMARY"
