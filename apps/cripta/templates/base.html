{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}VtesProxi{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            min-height: 100vh;
        }
        .sidebar {
            min-height: 100vh;
            background: #232526;
            color: #fff;
            padding: 2rem 1rem 1rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: start;
        }
        .sidebar-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .sidebar-logo {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: #fff;
            object-fit: contain;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
        }
        .nav-link {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            padding: 0.6rem 1.2rem;
            transition: background 0.2s;
        }
        .nav-link.active, .nav-link:hover {
            background: #414345;
            color: #fff;
        }
        .main-content {
            padding: 2.5rem 2rem 2rem 2rem;
            width: 100%;
        }
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                flex-direction: row;
                align-items: center;
                padding: 1rem 0.5rem;
            }
            .sidebar-title {
                font-size: 1.2rem;
                margin-bottom: 0;
                margin-right: 1.5rem;
            }
            .nav-link {
                font-size: 1rem;
                margin-bottom: 0;
                margin-right: 0.5rem;
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row flex-nowrap">
            <nav class="col-auto sidebar d-flex flex-column">
                <div class="sidebar-title">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" class="sidebar-logo">
                    VtesProxi
                </div>
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Inicio</a>
                <a class="nav-link {% if 'cripta' in request.path %}active{% endif %}" href="/cripta/importar-imagen/">Cripta</a>
                <a class="nav-link {% if 'libreria' in request.path %}active{% endif %}" href="/libreria/importar-imagen/">Librería</a>
                <a class="nav-link {% if 'mis-cartas' in request.path %}active{% endif %}" href="/mis-cartas/">Mis cartas</a>
                <a class="nav-link {% if request.path == '/pdf/' %}active{% endif %}" href="/pdf/">PDF</a>
                <!-- Puedes añadir más enlaces aquí -->
            </nav>
            <main class="col main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
