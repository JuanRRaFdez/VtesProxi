[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    ".venv",
    "media",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["I001", "F405"]

[tool.mypy]
python_version = "3.12"
# MyPy rollout matrix
# - Phase A (owner: Core platform maintainers): webvtes/, scripts/, desktop/ (active gate)
# - Phase B (owner: app domain maintainers): apps/layouts/, apps/srv_textos/ (adoption phase)
# - Phase C (owner: quality gate maintainers): stricter per-module flags once B is stable
files = ["webvtes", "scripts", "desktop"]
ignore_missing_imports = true
follow_imports = "skip"
allow_untyped_globals = true
warn_unused_configs = true
pretty = true

[[tool.mypy.overrides]]
# Phase B stays explicit and isolated; avoids broad repo-wide ignores when we extend scope.
# Owner: app domain maintainers.
module = ["apps.layouts.*", "apps.srv_textos.*"]
ignore_errors = true

[[tool.mypy.overrides]]
# Namespace-package module names when `apps/` is not a Python package root.
module = ["layouts.*", "srv_textos.*"]
ignore_errors = true
